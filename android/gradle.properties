# JVM memory options (stable for most machines)
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError

# Use AndroidX
android.useAndroidX=true
android.enableJetifier=true

# Disable Gradle daemon if crashes persist (optional)
# org.gradle.daemon=false

# Parallel builds (faster)
org.gradle.parallel=true

# Kotlin compiler daemon memory
kotlin.daemon.jvm.options=-Xmx2G

# Caching
org.gradle.caching=true
org.gradle.daemon=true
org.gradle.jvmargs=-Xmx2048m
kotlin.incremental=true
